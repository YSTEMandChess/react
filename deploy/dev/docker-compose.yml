services:
  apache:
    image: httpd:2.4
    ports:
      - "80:80"
    volumes:
      - ./httpd.conf:/usr/local/apache2/conf/httpd.conf:ro
    depends_on:
      - react-app
      - middlewarenode
      - chessserver
      - stockfishserver

  react-app:
    build: ../../react-ystemandchess
    container_name: react-app
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_CHESS_SERVER_URL=http://localhost:3001
      - REACT_APP_MIDDLEWARE_URL=http://localhost:8000
      - REACT_APP_STOCKFISH_URL=http://localhost:8080

  middlewarenode:
    build: ../../middlewareNode
    container_name: middlewarenode
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - SESSION_SECRET=dev-secret-replace-in-prod
      # Analytics rate limit — requests per 15-minute window per IP (default: 100)
      - ANALYTICS_RATE_LIMIT_MAX=100

  chessserver:
    build: ../../chessServer
    container_name: chessserver
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MIDDLEWARE_URL=http://middlewarenode:8000

  stockfishserver:
    build: ../../stockfishServer
    container_name: stockfishserver
    ports:
      - "9324:9324"
    environment:
      - PORT=9324

# Usage: docker-compose up --build
# Access at: http://localhost
